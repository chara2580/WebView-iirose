name: Unzip and Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      
      - name: Generate fixed debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -storepass android -keypass android \
            -noprompt
      
      - name: Configure Gradle mirror
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle <<EOF
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/google' }
              }
          }
          buildscript {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/google' }
              }
          }
          EOF
          cat ~/.gradle/init.gradle
      
      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Find and move APK
        run: |
          mkdir -p download
          find app -name "*.apk" -exec cp {} download/ \;
          ls -la download/
      
      - name: Commit and push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/*.apk 2>/dev/null || echo "No APK files to add"
          git commit -m "Add compiled APK" || echo "No changes to commit"
          git push