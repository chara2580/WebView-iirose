name: Unzip and Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip
        run: |
          unzip -o app.zip
          rm app.zip
          ls -la
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      
      - name: Configure Gradle mirror
        run: |
          cat > ~/.gradle/init.gradle <<EOF
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/google' }
              }
          }
          EOF
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Move APK to output directory
        run: |
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/ \;
          ls -la output/
      
      - name: Commit and push APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.apk
          git commit -m "Add compiled APK" || echo "No changes to commit"
          git push
